<ion-header>
  <ion-toolbar>
    <div class="logo-container" (click)="navigateTo('/group-admin/home')">
      <ion-icon name="football-outline" class="football-icon"></ion-icon>
      <div class="logo-text">
        <span class="logo-predict3">Predict3</span>
        <span class="logo-subtitle">Predict3</span>
      </div>
    </div>
    <ion-buttons slot="end">
      <ion-button (click)="navigateTo('/group-admin/settings')">
        <ion-icon name="person-outline" class="profile-icon"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-tabs>
  <ion-tab-bar slot="bottom">
    <ion-tab-button tab="home" href="/group-admin/home">
      <ion-icon name="home-outline"></ion-icon>
      <ion-label>Home</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="predictions" href="/group-admin/predictions">
      <ion-icon name="football-outline"></ion-icon>
      <ion-label>Predictions</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="group" href="/group-admin/group">
      <ion-icon name="people-outline"></ion-icon>
      <ion-label>Group</ion-label>
    </ion-tab-button>
  </ion-tab-bar>
</ion-tabs>
