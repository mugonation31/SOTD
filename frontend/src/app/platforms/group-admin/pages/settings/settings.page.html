<ion-header>
  <ion-toolbar>
    <ion-title>Settings</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <!-- Profile content (only — Settings tab deleted in Phase 8 cut.
       Group visibility, points distribution, joker rules, chat, and
       notification toggles all required substantial backend work
       (configurable scoring, chat infra, notification engine) that's
       out of MVP scope. Profile tab is the entire page now. -->
  <div>
    <ion-card>
      <ion-card-content>
        <!-- Profile Picture (Centered) -->
        <div class="profile-picture-section">
          <div class="profile-picture-container">
            <div class="profile-picture">
              <ng-container *ngIf="profilePicture; else defaultProfileIcon">
                <img [src]="profilePicture" alt="Profile Picture" />
              </ng-container>
              <ng-template #defaultProfileIcon>
                <ion-icon
                  name="person-outline"
                  class="default-profile-icon"
                ></ion-icon>
              </ng-template>
            </div>
            <div class="camera-icon" (click)="fileInput.click()">
              <ion-icon name="camera-outline"></ion-icon>
            </div>
            <input
              #fileInput
              type="file"
              accept="image/*"
              (change)="onFileSelected($event)"
              style="display: none"
            />
          </div>
        </div>

        <!-- Profile Information (Left-aligned) -->
        <div class="profile-info-section">
          <ion-item>
            <ion-label position="stacked">First name</ion-label>
            <ion-input
              [(ngModel)]="profile.firstName"
              placeholder="First name"
            ></ion-input>
          </ion-item>

          <ion-item>
            <ion-label position="stacked">Last name</ion-label>
            <ion-input
              [(ngModel)]="profile.lastName"
              placeholder="Last name"
            ></ion-input>
          </ion-item>

          <ion-item>
            <ion-label position="stacked">Username</ion-label>
            <ion-input [(ngModel)]="profile.username" readonly></ion-input>
          </ion-item>

          <ion-item>
            <ion-label position="stacked">Email</ion-label>
            <ion-input
              [(ngModel)]="profile.email"
              type="email"
              readonly
            ></ion-input>
          </ion-item>

          <ion-item>
            <ion-label position="stacked">Role</ion-label>
            <ion-input [(ngModel)]="profile.role" readonly></ion-input>
          </ion-item>

          <ion-item>
            <ion-label position="stacked">Joined</ion-label>
            <ion-input
              [(ngModel)]="profile.joinedDate"
              readonly
            ></ion-input>
          </ion-item>

          <ion-button
            expand="block"
            (click)="updateProfile()"
            class="ion-margin-top"
          >
            Update Profile
          </ion-button>
        </div>
      </ion-card-content>
    </ion-card>

    <ion-card>
      <ion-card-header>
        <ion-card-title>
          <ion-icon name="key-outline"></ion-icon>
          Change Password
        </ion-card-title>
      </ion-card-header>
      <ion-card-content>
        <div class="form-section">
          <ion-item>
            <ion-label position="stacked">Current Password</ion-label>
            <ion-input
              type="password"
              [(ngModel)]="passwordForm.current"
            ></ion-input>
          </ion-item>

          <ion-item>
            <ion-label position="stacked">New Password</ion-label>
            <ion-input
              type="password"
              [(ngModel)]="passwordForm.new"
            ></ion-input>
          </ion-item>

          <ion-item>
            <ion-label position="stacked">Confirm New Password</ion-label>
            <ion-input
              type="password"
              [(ngModel)]="passwordForm.confirm"
            ></ion-input>
          </ion-item>

          <ion-button
            expand="block"
            (click)="changePassword()"
            class="ion-margin-top"
          >
            Change Password
          </ion-button>
        </div>
      </ion-card-content>
    </ion-card>

    <ion-button
      expand="block"
      color="danger"
      (click)="logout()"
      class="ion-margin-top"
    >
      <ion-icon name="log-out-outline" slot="start"></ion-icon>
      Logout
    </ion-button>
  </div>


</ion-content>
