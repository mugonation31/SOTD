<div class="page-wrapper">
  <ion-header>
    <ion-toolbar>
      <div class="logo-container" (click)="navigateTo('/super-admin/dashboard')">
        <ion-icon name="football-outline" class="football-icon"></ion-icon>
        <div class="logo-text">
          <span class="logo-predict3">Predict3</span>
          <span class="logo-subtitle">Scores On The Doors</span>
        </div>
      </div>
      <ion-buttons slot="end">
        <ion-button class="logout-button" (click)="logout()">
          <ion-icon name="log-out-outline"></ion-icon>
        </ion-button>
      </ion-buttons>
    </ion-toolbar>
  </ion-header>

  <ion-tabs>
    <ion-tab-bar slot="bottom">
      <ion-tab-button tab="dashboard" href="/super-admin/dashboard">
        <ion-icon name="grid-outline"></ion-icon>
        <ion-label>Dashboard</ion-label>
      </ion-tab-button>

      <ion-tab-button tab="users" href="/super-admin/users-groups">
        <ion-icon name="people-outline"></ion-icon>
        <ion-label>Users & Groups</ion-label>
      </ion-tab-button>
    </ion-tab-bar>
  </ion-tabs>
</div>
