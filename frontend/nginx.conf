server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Hide nginx version in Server header + error pages (info disclosure)
    server_tokens off;

    # -------------------------------------------------------------------
    # Security headers (applied at server scope — see Note below).
    # `always` ensures they're added even on 4xx/5xx error responses.
    #
    # Note on inheritance: nginx `add_header` directives do NOT inherit
    # into inner `location` blocks that define their own `add_header`.
    # The asset and index.html locations below re-use Cache-Control
    # `add_header`, which would shadow these server-scoped ones in those
    # locations. See the explicit re-declaration inside those blocks.
    # -------------------------------------------------------------------
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
    #
    # HSTS is NOT set here — TLS terminates upstream (Cloudflare Pages /
    # load balancer), which is the correct place to add
    # `Strict-Transport-Security`. Setting it on this inner nginx would
    # be ineffective because connections to port 80 internally are plain HTTP.
    #
    # Content-Security-Policy deferred to Task 4.3 — Angular + Ionic need
    # `'unsafe-inline'` for styles, and the exact allowlist of Supabase /
    # Google OAuth origins needs careful validation before enforcing to
    # avoid breaking runtime functionality.
    # -------------------------------------------------------------------

    # Gzip for text assets (Ionic bundles are sizeable)
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Cache hashed asset files aggressively (Angular emits content-hashed filenames)
    location ~* \.(?:css|js|woff2?|eot|ttf|svg|png|jpg|jpeg|gif|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # Re-declare server-scope security headers — Nginx `add_header`
        # does not inherit once an inner block adds its own.
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
        try_files $uri =404;
    }

    # HTML should not be cached (so new deploys land immediately)
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        # Same re-declaration as above.
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;
    }

    # SPA fallback - everything else to index.html so Angular Router handles deep links
    location / {
        try_files $uri $uri/ /index.html;
    }
}
